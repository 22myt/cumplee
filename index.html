<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Perfil Web - Space</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .no-scroll {
      overflow: hidden !important;
      height: 100vh !important;
      margin: 0 !important;
      padding: 0 !important;
    }
  </style>
</head>
<body class="no-scroll">
  <!-- Contenedor principal que ocupa toda la pantalla -->
  <div id="main-container">
    <!-- Contenedor interno que mantendrá las proporciones -->
    <div id="content-wrapper">
      <!-- Bloque de botones a la izquierda -->
      <div id="buttons">
        <button id="light-btn">
          <img id="img-light" src="darkmode/buttons/lightmode1.png" alt="Light" class="btn-img">
        </button>
        <button id="dark-day-btn">
          <img id="img-dark-day" src="darkmode/buttons/darkmode1.png" alt="Dark Día" class="btn-img">
        </button>
        <button id="dark-night-btn">
          <img id="img-dark-night" src="darkmode/buttons/darkmode1.png" alt="Dark Noche" class="btn-img">
        </button>
      </div>

      <!-- Contenedor principal Space -->
      <div id="space">
        <!-- ============================================ -->
        <!-- HEAD MODIFICADO: AHORA CON SUPERPOSICIONES   -->
        <!-- ============================================ -->
        <div id="head">
          <!-- Imagen de Fondo (base) -->
          <img id="img-head-bg" src="darkmode/head/FONDO.png" alt="Head Background" class="mode-img head-bg">

          <!-- Contenedor para elementos superpuestos -->
          <div class="head-overlays">
            <!-- Título (estático) -->
            <img id="img-head-title" src="darkmode/head/title.png" alt="Title" class="head-title mode-img">
            
            <!-- Contenedor del Logo y el GIF (para manejar el hover sincronizado) -->
            <div class="logo-gif-container">
              <!-- Logo (cambia con hover) -->
              <img id="img-head-logo" src="darkmode/head/logo.png" alt="Logo" class="head-logo mode-img">
              <!-- GIF (cambia con hover) -->
              <img id="img-head-gif" src="darkmode/head/logogif1.gif" alt="Logo GIF" class="head-gif mode-img">
            </div>
          </div>
        </div>

        <div id="content">
          <div id="lateral">
            <img id="img-lateral" src="darkmode/lateral.png" alt="Lateral" class="mode-img">
          </div>

          <div id="main">
                              <div id="top">
                              <!-- Imagen de fondo -->
                              <img id="img-top-bg" src="darkmode/top/ZONA_TOP.png" alt="Top Background" class="mode-img top-bg">
                              
                              <!-- Contenedor para elementos superpuestos -->
                              <div class="top-overlays">
                                
                                  <!-- ELEMENTOS DE LA DERECHA -->
                                  <div class="top-right">
                                    <!-- Panel 1 (estático) -->
                                    <img src="darkmode/top/Panel_1.png" alt="Panel 1" class="top-panel-1 mode-img">
                                    
                                    <!-- Texto 1 con hover (AHORA CON SU PROPIO CONTENEDOR) -->
                                    <div class="top-texto-container">
                                      <img src="darkmode/top/texto1.png" alt="Texto 1" class="top-texto mode-img top-texto-img">
                                      <img src="darkmode/top/texto2.png" alt="Texto 1 Hover" class="top-texto mode-img top-texto-hover">
                                    </div>
                                    
                                    <!-- Panel 2 (estático) -->
                                    <img src="darkmode/top/Panel_2.png" alt="Panel 2" class="top-panel-2 mode-img">
                                    
                                    <!-- Panel 3 (estático) -->
                                    <img src="darkmode/top/Panel_3.png" alt="Panel 3" class="top-panel-3 mode-img">
                                  </div>
                                  
                                  <!-- ELEMENTOS DE LA IZQUIERDA -->
                                  <div class="top-left">
                                    <!-- CUADRO 1 con hover -->
                                    <div class="top-cuadro1-container">
                                      <img src="darkmode/top/CUADRO1.png" alt="Cuadro 1" class="top-cuadro1 mode-img">
                                      <img src="darkmode/top/CUADRO1hover.png" alt="Cuadro 1 Hover" class="top-cuadro1 mode-img top-cuadro1-hover">
                                    </div>
                                    
                                    <!-- CUADRO 2 con hover -->
                                    <div class="top-cuadro2-container">
                                      <img src="darkmode/top/CUADRO2.png" alt="Cuadro 2" class="top-cuadro2 mode-img">
                                      <img src="darkmode/top/CUADRO2hover.png" alt="Cuadro 2 Hover" class="top-cuadro2 mode-img top-cuadro2-hover">
                                    </div>
                                  </div>
                                  
                                  <!-- ELEMENTO CENTRAL SUPERIOR (Asukas) - AHORA ATRAVESABLE -->
                                  <img src="darkmode/top/Asukas.png" alt="Asukas" class="top-asukas mode-img">
                                                                  
                              </div>
                            </div>
            <div id="bot">
              <img id="img-bot" src="darkmode/bot/ZONA_BOT.png" alt="Bot" class="mode-img">
            </div>
            <div id="footer">
              <img id="img-footer" src="darkmode/FOOTER.png" alt="Footer" class="mode-img">
            </div>
          </div>

          <div id="info">
            <img id="img-info" src="darkmode/info/RECTANGULO_LARGO.png" alt="Info" class="mode-img">
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
