<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Perfil Web - Space</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Pequeños ajustes CSS necesarios para el scaling */
    .container-wrapper {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    #space.scaled {
      transform-origin: center center;
    }
  </style>
</head>
<body>
  <!-- Contenedor padre que envolverá todo -->
  <div id="layout" class="container-wrapper">
    <!-- Bloque de botones a la izquierda -->
    <div id="buttons">
      <button id="light-btn">
        <img id="img-light" src="darkmode/buttons/lightmode1.png" alt="Light" class="btn-img">
      </button>
      <button id="dark-day-btn">
        <img id="img-dark-day" src="darkmode/buttons/darkmode1.png" alt="Dark Día" class="btn-img">
      </button>
      <button id="dark-night-btn">
        <img id="img-dark-night" src="darkmode/buttons/darkmode1.png" alt="Dark Noche" class="btn-img">
      </button>
    </div>

    <!-- Contenedor principal Space (este será escalado) -->
    <div id="space">
      <div id="head">
        <img id="img-head" src="darkmode/head/FONDO.png" alt="Head" class="mode-img">
      </div>

      <div id="content">
        <div id="lateral">
          <img id="img-lateral" src="darkmode/lateral.png" alt="Lateral" class="mode-img">
        </div>

        <div id="main">
          <div id="top">
            <img id="img-top" src="darkmode/top/ZONA_TOP.png" alt="Top" class="mode-img">
          </div>
          <div id="bot">
            <img id="img-bot" src="darkmode/bot/ZONA_BOT.png" alt="Bot" class="mode-img">
          </div>
          <div id="footer">
            <img id="img-footer" src="darkmode/FOOTER.png" alt="Footer" class="mode-img">
          </div>
        </div>

        <div id="info">
          <img id="img-info" src="darkmode/info/RECTANGULO_LARGO.png" alt="Info" class="mode-img">
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
