<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Perfil Web - Space</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="space">
    <!-- Head -->
    <div id="head">
      <img src="darkmode/head/FONDO.png" alt="Head">
    </div>

    <!-- Content -->
    <div id="content">
      <!-- Buttons -->
      <div id="buttons">
        <button id="light-btn">
          <img src="darkmode/buttons/lightmode1.png" alt="Light">
        </button>
        <button id="dark-day-btn">
          <img src="darkmode/buttons/darkmode1.png" alt="Dark Día">
        </button>
        <button id="dark-night-btn">
          <img src="darkmode/buttons/darkmode1.png" alt="Dark Noche">
        </button>
      </div>

      <!-- Lateral -->
      <div id="lateral">
        <img src="darkmode/lateral.png" alt="Lateral">
      </div>

      <!-- Main -->
      <div id="main">
        <div id="top">
          <img src="darkmode/top/ZONA_TOP.png" alt="Top">
        </div>
        <div id="bot">
          <img src="darkmode/bot/ZONA_BOT.png" alt="Bot">
        </div>
        <div id="footer">
          <img src="darkmode/FOOTER.png" alt="Footer">
        </div>
      </div>

      <!-- Info -->
      <div id="info">
        <img src="darkmode/info/RECTANGULO_LARGO.png" alt="Info">
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
