<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Perfil Web - Space</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Contenedor padre: buttons + space -->
  <div id="layout">
    <!-- Bloque de botones a la izquierda -->
    <div id="buttons">
      <button id="light-btn">
        <img id="img-light" src="darkmode/buttons/lightmode1.png" alt="Light">
      </button>
      <button id="dark-day-btn">
        <img id="img-dark-day" src="darkmode/buttons/darkmode1.png" alt="Dark Día">
      </button>
      <button id="dark-night-btn">
        <img id="img-dark-night" src="darkmode/buttons/darkmode1.png" alt="Dark Noche">
      </button>
    </div>

    <!-- Contenedor principal Space -->
    <div id="space">
      <div id="head">
        <img id="img-head" src="darkmode/head/FONDO.png" alt="Head">
      </div>

      <div id="content">
        <div id="lateral">
          <img id="img-lateral" src="darkmode/lateral.png" alt="Lateral">
        </div>

        <div id="main">
          <div id="top">
            <img id="img-top" src="darkmode/top/ZONA_TOP.png" alt="Top">
          </div>
          <div id="bot">
            <img id="img-bot" src="darkmode/bot/ZONA_BOT.png" alt="Bot">
          </div>
          <div id="footer">
            <img id="img-footer" src="darkmode/FOOTER.png" alt="Footer">
          </div>
        </div>

        <div id="info">
          <img id="img-info" src="darkmode/info/RECTANGULO_LARGO.png" alt="Info">
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
