<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil Web - 3 Modos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dark-mode-1">
    <!-- CONTENEDOR PRINCIPAL centrado en pantalla 1920x1080 -->
    <div class="container">
        <!-- CABECERA -->
        <header class="head">
            <!-- Los botones están dentro del head, a la izquierda -->
            <div class="head-buttons">
                <button id="mode-light" class="mode-btn" aria-label="Modo Claro"></button>
                <button id="mode-dark1" class="mode-btn" aria-label="Modo Oscuro Día"></button>
                <button id="mode-dark2" class="mode-btn" aria-label="Modo Oscuro Noche"></button>
            </div>
        </header>
        
        <!-- CONTENEDOR FLEX para el resto -->
        <div class="content-wrapper">
            <!-- LATERAL (izquierda) -->
            <aside class="lateral"></aside>
            
            <!-- SECCIÓN PRINCIPAL (Top, Bot, Footer) -->
            <main class="main-content">
                <div class="top"></div>
                <div class="bot"></div>
                <footer class="footer"></footer>
            </main>
            
            <!-- INFO (derecha) -->
            <aside class="info"></aside>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
